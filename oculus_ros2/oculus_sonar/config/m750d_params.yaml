# ============================================================================
# Oculus M750D parameters
# ============================================================================
# Parameter Types:
#   [Static]  - Read-only, requires node restart
#   [Dynamic] - Can be changed at runtime via ros2 param set
# ============================================================================

oculus:
  m750d:
    ros__parameters:
      # ======================================================================
      # MODEL [Static]
      # ======================================================================
      sonar_model: "m750d"         # Oculus M750d

      # ======================================================================
      # NETWORK + FRAMES [Static]
      # ======================================================================
      ip_address: "192.168.0.200"  # Sonar IP address ("auto" for auto-detect)
      frame_id: "sonar_link"       # Frame ID (matches boat_description URDF)

      # ======================================================================
      # IMAGING [Dynamic — runtime changeable via ros2 param set]
      # ======================================================================
      range: 10.0                  # [m] [Dynamic] M750d: 0.1-120m
      gain: 100                    # [%] [Dynamic] valid: 1-100
      gamma: 200                   # [Dynamic] gamma correction, 0-255
      ping_rate: 2                 # [Dynamic] 0=Normal,1=High,2=Highest,3=Low,4=Lowest,5=Standby
      freq_mode: 2                 # [Dynamic] 1=LowFrequency(750kHz), 2=HighFrequency(1.2MHz)
      data_size: "8bit"            # [Dynamic] "8bit","16bit","32bit"

      # ======================================================================
      # FLAGS [Static]
      # ======================================================================
      send_range_as_meters: true
      send_gain: true
      send_simple_return: true
      gain_assistance: false

      # Fan image settings removed - use separate fan_imager node instead
      # To enable fan image, launch with m750d_with_fan.launch.py
