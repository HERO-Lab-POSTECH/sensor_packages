# m1200d_params.yaml
# Date: 251125
# Description: ROS2 parameter configuration for Oculus M1200d sonar

oculus:
  m1200d:
    ros__parameters:
      # Model specific
      sonar_model: "m1200d"        # Oculus M1200d

      # Connection settings
      ip_address: "192.168.0.201"  # Sonar IP address ("auto" for auto-detect)
      frame_id: "sonar_link"       # Frame ID for published messages (matches boat_description URDF)

      # M1200d typical configuration
      range: 10.0                   # Range (meters), M1200d: 0.1-40m
      gain: 100                     # Gain (percentage), valid: 1-100
      gamma: 200                    # Gamma correction, valid: 0-255
      ping_rate: 2                  # 0=Normal, 1=High, 2=Highest, 3=Low, 4=Lowest, 5=Standby
      freq_mode: 2                  # 1=LowFrequency(1.2MHz), 2=HighFrequency(2.1MHz)
      data_size: "8bit"             # "8bit", "16bit", "32bit"
      num_beams: 1                  # 0=256beams, 1=512beams

      # Flags
      send_range_as_meters: true
      send_gain: true
      send_simple_return: true
      gain_assistance: false

      # Fan image settings removed - use separate fan_imager node instead
      # To enable fan image, launch with m1200d_with_fan.launch.py